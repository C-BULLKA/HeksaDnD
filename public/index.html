<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>HeksaDnD - Edytor map</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://unpkg.com/konva@8/konva.min.js"></script>
  <link rel="icon" href="/favicon.ico" />
</head>
<body>
  <div id="app">
    <aside id="left-panel">
      <h3>Paleta terenu</h3>
      <button data-terrain="none" class="terrain-btn active">Nic</button>
      <button data-terrain="stones" class="terrain-btn">Kamienie</button>
      <button data-terrain="mud" class="terrain-btn">Błoto</button>
      <button data-terrain="wall" class="terrain-btn">Ściana</button>

      <h3>Nowa mapa</h3>
      <label>Typ kształtu
        <select id="shape-select">
          <option value="empty">Pusta</option>
          <option value="rectangle">Prostokąt</option>
          <option value="diamond">Diament</option>
          <option value="hexagon">Heksagon</option>
        </select>
      </label>
      <label>Width <input id="map-w" type="number" value="12" min="1" /></label>
      <label>Height <input id="map-h" type="number" value="10" min="1" /></label>
      <button id="create-map">Utwórz mapę</button>

      <h3>Eksport / Import</h3>
      <button id="export-json">Eksportuj JSON</button>
      <input id="import-file" type="file" accept=".json" />
    </aside>

    <main id="canvas-wrap">
      <div id="stage-parent"></div>
    </main>

    <aside id="right-panel">
      <h3>Stan gry</h3>
      <div>Mapa: <span id="map-size">—</span></div>
      <button id="start-game">Rozpocznij grę</button>
      <button id="end-turn">Zakończ turę</button>
      <pre id="game-info" style="white-space: pre-wrap; font-size: 12px; margin-top: 8px;"></pre>
    </aside>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
